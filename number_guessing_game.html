<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="number_guessing_game.css" />
  </head>
  <body>
    <h1>
      NUMBER <br />
      GUESSING GAME
    </h1>
    <div>
      <label for="guess">Guess The Number:</label>
      <input
        type="number"
        id="guess"
        name="number"
        placeholder="Guess The Number"
      />
      <button id="check-btn">Check Your Guess</button>
      <p id="result"></p>
    </div>
    <script src="number_guessing_game.js"></script>
  </body>
</html>
